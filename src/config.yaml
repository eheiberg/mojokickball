site:
  name: MojoKickball
  site: 'https://mojokickball.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: false

metadata:
  title:
    default: MojoKickball
    template: '%s — MojoKickball'
  description: 'Free inclusive 6-ball kickball every Sunday in Minneapolis. Come. Play. Everyone.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: MojoKickball
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@mojokickball'
    site: '@mojokickball'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: '/%slug%'
      robots:
        index: false

    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: false

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: false

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'light:only'
  announcement:
    isEnabled: false
